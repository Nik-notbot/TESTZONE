<script>
function compactFilters() {
    document.querySelectorAll('.back-bar').forEach(function(el) { el.remove(); });

    var hdr = document.querySelector('#root > div > header');
    if (hdr) {
        hdr.style.fontFamily = "'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        hdr.style.padding = '16px 40px';
        var h1 = hdr.querySelector('h1');
        if (h1) { h1.style.fontSize = '20px'; h1.style.fontWeight = '700'; h1.style.lineHeight = '1.2'; }
        hdr.querySelectorAll('p').forEach(function(p) {
            p.style.fontSize = '12px'; p.style.fontWeight = '500'; p.style.color = '#EF4444'; p.style.lineHeight = '1';
            if (p.textContent.trim() === 'финансы без санкций') p.textContent = 'Финансы без санкций';
        });
        var nav = hdr.querySelector('nav');
        if (nav) { nav.style.marginLeft = '20px'; nav.style.gap = '8px'; }
        hdr.querySelectorAll('button, a').forEach(function(btn) {
            btn.style.fontFamily = "'IBM Plex Sans', sans-serif";
            btn.style.fontSize = '14px'; btn.style.fontWeight = '500';
            btn.style.height = '40px'; btn.style.borderRadius = '12px';
            btn.style.padding = '0 16px'; btn.style.gap = '8px';
        });
    }

    var sidebarCol = document.querySelector('.flex-1.flex.flex-col.justify-evenly');
    if (sidebarCol) {
        sidebarCol.style.justifyContent = 'flex-start';
        sidebarCol.style.gap = '8px';
        sidebarCol.style.paddingTop = '12px';
    }

    var sidebar = document.querySelector('aside') || document.querySelector('h2')?.closest('[class*="space-y"], [class*="gap"]');
    if (!sidebar) {
        var h2 = document.querySelector('h2');
        if (h2) sidebar = h2.parentElement;
    }
    if (sidebar) {
        sidebar.style.gap = '4px';
        sidebar.querySelectorAll('[class*="space-y"]').forEach(function(el) {
            el.style.setProperty('--tw-space-y-reverse', '0', 'important');
            el.querySelectorAll(':scope > * + *').forEach(function(c) { c.style.marginTop = '4px'; });
        });
        sidebar.querySelectorAll('h3').forEach(function(h) { h.style.marginTop = '6px'; h.style.marginBottom = '2px'; });
        sidebar.querySelectorAll('h2').forEach(function(h) { h.style.marginTop = '6px'; h.style.marginBottom = '4px'; });
        sidebar.querySelectorAll('label').forEach(function(l) { l.style.padding = '2px 0'; });
    }
}
var _obs = new MutationObserver(function() { compactFilters(); });
_obs.observe(document.body, { childList: true, subtree: true });
setTimeout(compactFilters, 500);
setTimeout(compactFilters, 1500);
setTimeout(compactFilters, 3000);

document.addEventListener('click', function(e) {
    var el = e.target.closest('button, a, [role="button"]');
    if (!el) return;
    var text = el.textContent.trim();
    if (text.indexOf('eSIM') !== -1) {
        e.preventDefault();
        e.stopPropagation();
        window.top.location.href = 'https://heyesim.net';
    } else if (text.indexOf('VPN') !== -1) {
        e.preventDefault();
        e.stopPropagation();
        window.top.location.href = 'https://t.me/hey_vpn_bot';
    }
}, true);
</script>
