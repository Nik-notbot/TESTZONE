<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус заказа - HEY, STORE!</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo-section">
                <a href="index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
                    <img src="logo.png" alt="HEY, STORE!" class="logo-image">
                    <div><h1>HEY, STORE!</h1><p>Сервисы без санкций</p></div>
                </a>
            </div>
            <nav class="nav-left">
                <a href="https://t.me/hey_store_official" target="_blank" class="nav-button"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"></path><path d="m21.854 2.147-10.94 10.939"></path></svg><span>Канал</span></a>
                <a href="https://t.me/hey_store_bot" target="_blank" class="nav-button"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"></path></svg><span>Поддержка</span></a>
                <a href="https://blog.heystore.net/" target="_blank" class="nav-button"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2 2-2V7Z"></path><path d="M14 2v4a2 2 0 0 0 2 2h4"></path><path d="M10 9H8"></path><path d="M16 13H8"></path><path d="M16 17H8"></path></svg><span>Блог</span></a>
            </nav>
        </div>
        <div class="header-right"><button class="theme-toggle nav-button"></button></div>
    </header>

    <section class="service-page">
        <a href="index.html" class="back-link"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>На главную</a>
        <div class="service-page-content" style="text-align: center;">
            <div id="statusArea" style="padding: 40px 20px;">
                <div class="order-spinner" id="spinner"></div>
                <h1 id="statusTitle" style="margin-top: 20px;">Проверяем заказ...</h1>
                <p id="statusText" style="color: var(--muted); margin-top: 12px;">Пожалуйста, подождите</p>
                <div id="voucherCodes" style="display:none; margin-top: 30px;"></div>
                <div id="orderInfo" style="display:none; margin-top: 20px; color: var(--muted); font-size: 14px;"></div>
                <a href="index.html" id="homeBtn" class="pay-button" style="display:none; margin-top: 30px; text-decoration: none; max-width: 400px; margin-left: auto; margin-right: auto;">
                    <span>Вернуться на главную</span>
                </a>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-links">
            <a href="privacy.html">Политика конфиденциальности</a>
            <a href="offer.html">Оферта</a>
            <a href="personal-data.html">Обработка персональных данных</a>
        </div>
        <p>&copy; 2025 HEY, STORE! Все права защищены</p>
    </footer>

    <style>
        .order-spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .voucher-code-box {
            background: var(--background);
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 20px;
            margin: 12px auto;
            max-width: 500px;
            position: relative;
        }
        .voucher-code-box code {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
            word-break: break-all;
        }
        .copy-btn {
            margin-top: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .copy-btn:hover { background: var(--primary-hover); }
        .status-icon {
            width: 64px; height: 64px;
            margin: 0 auto 16px;
        }
        [data-theme="dark"] .voucher-code-box {
            background: #1f2937;
        }
    </style>

    <script src="js/api-config.js?v=4"></script>
    <script>
        initThemeToggle();

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId');
        const orderType = params.get('type') || 'vouchers';
        const rowId = params.get('rowId');
        const tableName = params.get('table');

        const statusTitle = document.getElementById('statusTitle');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const voucherCodes = document.getElementById('voucherCodes');
        const orderInfo = document.getElementById('orderInfo');
        const homeBtn = document.getElementById('homeBtn');

        const API_PATHS = {
            vouchers: `/api/vouchers/order/`,
            topup: `/api/topup/order/`,
            steam: `/api/steam/order/`,
            stars: `/api/stars/order/`
        };

        function getTableId() {
            if (tableName && BASEROW_TABLES[tableName]) return BASEROW_TABLES[tableName];
            const map = { vouchers: 'vouchers', topup: 'vouchers', steam: 'steam', stars: 'telegram', neural: 'neural' };
            return BASEROW_TABLES[map[orderType]] || null;
        }

        async function updateBaserowStatus(status, extraData) {
            if (!rowId) return;
            const tableId = getTableId();
            if (!tableId) return;
            const data = { 'Статус': status };
            if (extraData) Object.assign(data, extraData);
            await baserowUpdate(tableId, rowId, data);
        }

        if (!orderId) {
            showError('Заказ не найден', 'Не указан номер заказа');
        } else if (orderType === 'neural') {
            handleNeural();
        } else {
            checkOrder();
        }

        async function handleNeural() {
            await updateBaserowStatus('Paid');
            spinner.style.display = 'none';
            statusTitle.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg><br>Оплата прошла!';
            statusText.textContent = 'Мы получили ваш заказ и скоро свяжемся с вами по email.';
            orderInfo.style.display = 'block';
            orderInfo.textContent = `Заказ: ${orderId}`;
            homeBtn.style.display = 'flex';
            try {
                let msg = `✅ *Оплата нейросети!*\n\n🆔 Заказ: ${orderId}\n⏰ ${new Date().toLocaleString('ru-RU')}`;
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'Markdown' })
                });
            } catch (e) { /* silent */ }
        }

        let attempts = 0;
        const MAX_ATTEMPTS = 30;

        async function checkOrder() {
            try {
                const path = API_PATHS[orderType] || API_PATHS.vouchers;
                const res = await fetch(`${API_URL}${path}${encodeURIComponent(orderId)}`);
                const data = await res.json();

                if (data.error) {
                    showError('Ошибка', data.error.message || 'Не удалось загрузить заказ');
                    return;
                }

                const status = data.status;

                if (status === 'Success') {
                    showSuccess(data);
                } else if (status === 'Paid') {
                    statusTitle.textContent = 'Заказ оплачен';
                    statusText.textContent = 'Выполняем ваш заказ, пожалуйста подождите...';
                    retryLater();
                } else if (status === 'Pending') {
                    statusTitle.textContent = 'Ожидаем оплату';
                    statusText.textContent = 'Если вы уже оплатили, подождите пару минут...';
                    retryLater();
                } else if (status === 'Fail') {
                    await updateBaserowStatus('Failed');
                    showError('Ошибка заказа', 'К сожалению, заказ не удался. Обратитесь в поддержку.');
                } else {
                    statusTitle.textContent = `Статус: ${status}`;
                    retryLater();
                }
            } catch (e) {
                showError('Ошибка связи', 'Не удалось проверить статус заказа. Попробуйте обновить страницу.');
            }
        }

        function retryLater() {
            attempts++;
            if (attempts < MAX_ATTEMPTS) {
                setTimeout(checkOrder, 5000);
            } else {
                statusText.textContent = 'Заказ обрабатывается дольше обычного. Проверьте позже или обратитесь в поддержку.';
                spinner.style.display = 'none';
                homeBtn.style.display = 'flex';
            }
        }

        async function showSuccess(data) {
            spinner.style.display = 'none';
            statusTitle.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg><br>Заказ выполнен!';

            const extraData = {};
            if (data.vouchers && data.vouchers.length) {
                extraData['Код ваучера'] = data.vouchers.join('\n');
                voucherCodes.style.display = 'block';
                voucherCodes.innerHTML = '<h3 style="margin-bottom:16px;">Ваши коды:</h3>' +
                    data.vouchers.map(code => `
                        <div class="voucher-code-box">
                            <code>${code}</code><br>
                            <button class="copy-btn" onclick="copyCode(this, '${code}')">Скопировать</button>
                        </div>
                    `).join('');
                statusText.textContent = 'Сохраните коды! Также они отправлены на вашу почту.';
            } else if (orderType === 'steam') {
                statusText.textContent = 'Средства зачислены на ваш аккаунт Steam!';
            } else if (orderType === 'stars') {
                statusText.textContent = 'Звёзды зачислены в ваш Telegram!';
            } else if (orderType === 'topup') {
                statusText.textContent = 'Пополнение выполнено!';
            } else {
                statusText.textContent = 'Заказ успешно выполнен!';
            }

            await updateBaserowStatus('Success', extraData);

            if (data.email) {
                orderInfo.style.display = 'block';
                orderInfo.textContent = `Заказ: ${orderId} · Email: ${data.email}`;
            }

            homeBtn.style.display = 'flex';

            sendTelegramNotification(data);
        }

        function showError(title, text) {
            spinner.style.display = 'none';
            statusTitle.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg><br>' + title;
            statusText.textContent = text;
            homeBtn.style.display = 'flex';
        }

        function copyCode(btn, code) {
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'Скопировано!';
                setTimeout(() => btn.textContent = 'Скопировать', 2000);
            });
        }

        async function sendTelegramNotification(data) {
            try {
                let msg = `✅ *Заказ выполнен!*\n\n🆔 Заказ: ${orderId}\n📧 Email: ${data.email || 'не указан'}`;
                if (data.vouchers && data.vouchers.length) {
                    msg += `\n🎫 Коды:\n${data.vouchers.map(c => '`' + c + '`').join('\n')}`;
                }
                if (data.amount) msg += `\n💰 Сумма: ${data.amount} ₽`;
                msg += `\n⏰ ${new Date().toLocaleString('ru-RU')}`;
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'Markdown' })
                });
            } catch (e) { /* silent */ }
        }
    </script>
</body>
</html>
